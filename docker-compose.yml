version: '3.9'

services:
  # VENOM Proxy & Scanner
  venom:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: venom-proxy
    ports:
      - "8080:8080"    # MITM Proxy
      - "3000:3000"    # REST API
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgres://venom:venom@postgres:5432/venom_db
      - REDIS_URL=redis://redis:6379
    volumes:
      - venom_data:/app/.venom
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - venom_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: venom-postgres
    environment:
      POSTGRES_USER: venom
      POSTGRES_PASSWORD: venom_secure_password_change_in_prod
      POSTGRES_DB: venom_db
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    networks:
      - venom_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U venom"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: venom-redis
    command: redis-server --appendonly yes --requirepass redis_secure_password_change_in_prod
    volumes:
      - redis_data:/data
    networks:
      - venom_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: venom-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - venom_network
    restart: unless-stopped
    depends_on:
      - venom

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: venom-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - venom_network
    restart: unless-stopped
    depends_on:
      - prometheus

  # ELK Stack - Elasticsearch
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: venom-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - venom_network
    restart: unless-stopped

  # ELK Stack - Kibana
  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: venom-kibana
    ports:
      - "5601:5601"
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - venom_network
    restart: unless-stopped

volumes:
  venom_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  elasticsearch_data:

networks:
  venom_network:
    driver: bridge
