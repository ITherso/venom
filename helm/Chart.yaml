apiVersion: v2
name: venom
description: VENOM Pentesting Platform - Helm Chart
type: application

version: 1.0.0
appVersion: "1.0.0"

keywords:
  - pentesting
  - security
  - vulnerability-scanner
  - web-application-testing

home: https://github.com/ITherso/venom
sources:
  - https://github.com/ITherso/venom

maintainers:
  - name: VENOM Team
    email: team@venom.dev
    url: https://venom.dev

dependencies:
  - name: postgresql
    version: "12.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  - name: redis
    version: "17.x.x"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
