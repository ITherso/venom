# VENOM Helm Chart Values
# Complete configuration for single-node and HA deployments

global:
  projectName: venom
  version: "1.0.0"
  environment: production

image:
  repository: ghcr.io/itherso/venom
  tag: "1.0.0"
  pullPolicy: IfNotPresent
  digest: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

replicaCount: 3

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "9090"
  prometheus.io/path: "/metrics"

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: LoadBalancer
  port: 8080
  targetPort: 8080
  annotations: {}

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  hosts:
    - host: venom.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: venom-tls
      hosts:
        - venom.example.com

resources:
  limits:
    cpu: 2000m
    memory: 2Gi
  requests:
    cpu: 1000m
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - venom
          topologyKey: kubernetes.io/hostname

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 2

persistence:
  enabled: true
  storageClassName: "standard"
  accessModes:
    - ReadWriteOnce
  size: 50Gi
  mountPath: /app/data

postgresql:
  enabled: true
  auth:
    username: venom
    password: "change-me-in-production"
    database: venom_db
  primary:
    persistence:
      size: 50Gi
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi

redis:
  enabled: true
  auth:
    enabled: true
    password: "change-me-in-production"
  master:
    persistence:
      size: 20Gi
    resources:
      requests:
        cpu: 250m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi

environment:
  LOG_LEVEL: info
  RUST_LOG: venom=info
  PROXY_PORT: "8080"
  API_PORT: "3000"

secrets:
  jwtSecret: "generate-random-secret"
  encryptionKey: "generate-random-key"
  apiKey: "generate-random-api-key"

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 30s
  grafana:
    enabled: true
    dashboards: true

backup:
  enabled: true
  schedule: "0 2 * * *"
  retention: 30
  storageClass: "standard"
  size: 100Gi

rbac:
  create: true

networkPolicy:
  enabled: true
  ingress: true
  egress: true

tls:
  enabled: true
  certManager:
    enabled: true
    issuer: letsencrypt-prod

ssl:
  certSecret: venom-tls
  caSecret: venom-ca
