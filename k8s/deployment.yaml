apiVersion: v1
kind: Namespace
metadata:
  name: venom

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: venom-config
  namespace: venom
data:
  RUST_LOG: "info"
  RUST_BACKTRACE: "1"

---
apiVersion: v1
kind: Secret
metadata:
  name: venom-secrets
  namespace: venom
type: Opaque
stringData:
  DATABASE_URL: "postgres://venom:venom@postgres:5432/venom_db"
  REDIS_URL: "redis://:redis_password@redis:6379"
  API_KEY: "your-secure-api-key-here"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: venom-proxy
  namespace: venom
  labels:
    app: venom
    component: proxy
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  selector:
    matchLabels:
      app: venom
      component: proxy
  template:
    metadata:
      labels:
        app: venom
        component: proxy
    spec:
      serviceAccountName: venom
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: venom
        image: itherso/venom:latest
        imagePullPolicy: Always

        ports:
        - name: proxy
          containerPort: 8080
          protocol: TCP
        - name: api
          containerPort: 3000
          protocol: TCP

        envFrom:
        - configMapRef:
            name: venom-config
        - secretRef:
            name: venom-secrets

        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: 2000m
            memory: 2Gi

        livenessProbe:
          httpGet:
            path: /health
            port: api
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /health
            port: api
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2

        volumeMounts:
        - name: venom-data
          mountPath: /app/.venom
        - name: config
          mountPath: /app/config
          readOnly: true

      volumes:
      - name: venom-data
        persistentVolumeClaim:
          claimName: venom-pvc
      - name: config
        configMap:
          name: venom-config

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: venom-pvc
  namespace: venom
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  storageClassName: standard

---
apiVersion: v1
kind: Service
metadata:
  name: venom
  namespace: venom
  labels:
    app: venom
spec:
  type: LoadBalancer
  ports:
  - name: proxy
    port: 8080
    targetPort: proxy
    protocol: TCP
  - name: api
    port: 3000
    targetPort: api
    protocol: TCP
  selector:
    app: venom
    component: proxy

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: venom
  namespace: venom

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: venom
  namespace: venom
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: venom
  namespace: venom
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: venom
subjects:
- kind: ServiceAccount
  name: venom
  namespace: venom

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: venom-hpa
  namespace: venom
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: venom-proxy
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
